services:
  # Django Backend Service
  - type: web
    name: hair-scalp-backend
    env: python
    region: oregon
    plan: free
    branch: main
    buildCommand: "chmod +x build.sh && ./build.sh"
    startCommand: "cd minor && gunicorn minor.wsgi:application --bind 0.0.0.0:$PORT --workers 1 --threads 2 --timeout 120 --max-requests 100 --max-requests-jitter 10"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: DJANGO_SETTINGS_MODULE
        value: minor.settings_production
      - key: WEB_CONCURRENCY
        value: 1
      - key: DEBUG
        value: False
      - key: ALLOWED_HOSTS
        value: .onrender.com
